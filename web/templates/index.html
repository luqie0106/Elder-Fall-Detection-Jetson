<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>跌倒告警面板</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f7f8fa; margin: 0; padding: 20px; }
    .card { background: #fff; border-radius: 10px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
    h1 { margin: 0 0 12px 0; font-size: 22px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 8px; border-bottom: 1px solid #eceff3; font-size: 14px; }
    th { background: #fafbfc; }
    .elder-cell { display: flex; align-items: center; gap: 10px; }
    .avatar { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; border: 1px solid #dde3ea; background: #f3f5f8; }
    .snapshot { width: 96px; height: 54px; border-radius: 6px; object-fit: cover; border: 1px solid #dde3ea; background: #f3f5f8; }
    .toolbar { display: flex; justify-content: flex-end; margin-bottom: 10px; }
    .danger-btn { color: #b42318; border: 1px solid #f3c6c6; background: #fff5f5; border-radius: 6px; padding: 6px 10px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card">
    <h1>最近告警记录</h1>
    <div class="toolbar">
      <form method="post" action="/events/clear" onsubmit="return confirm('确认清空所有告警记录吗？该操作不可恢复。');">
        <button class="danger-btn" type="submit">一键清空所有告警记录</button>
      </form>
    </div>
    <table>
      <thead>
        <tr>
          <th>ID</th><th>时间</th><th>截图</th><th>摄像头</th><th>帧号</th><th>中心点</th><th>通道状态</th>
        </tr>
      </thead>
      <tbody>
        {% for e in events %}
        <tr>
          <td>{{ e.id }}</td>
          <td>{{ e.event_time }}</td>
          <td>
            {% if e.snapshot_path %}
            <a href="{{ e.snapshot_path }}" target="_blank" rel="noopener noreferrer">
              <img class="snapshot" src="{{ e.snapshot_path }}" alt="fall-{{ e.id }}" />
            </a>
            {% else %}
            -
            {% endif %}
          </td>
          <td>{{ e.camera_id }}</td>
          <td>{{ e.frame_idx }}</td>
          <td>({{ '%.1f'|format(e.cx) }}, {{ '%.1f'|format(e.cy) }})</td>
          <td>{{ e.channel_status }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</body>
</html>
